name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config
      
      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer
      
      - name: Configure buildozer
        run: |
          # Создаём папку для SDK в нужном месте
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk
          # Скачиваем и распаковываем SDK в нужное место
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d /home/runner/.buildozer/android/platform/android-sdk
          mv /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools /home/runner/.buildozer/android/platform/android-sdk/latest
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools
          mv /home/runner/.buildozer/android/platform/android-sdk/latest /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/
          # Принимаем лицензии
          yes | /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          # Устанавливаем нужные компоненты
          /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3" > /dev/null 2>&1
      
      - name: Build APK
        run: buildozer android debug deploy
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mac-changer-apk
          path: bin/*.apk
