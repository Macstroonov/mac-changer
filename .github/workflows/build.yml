name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/kivy:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build APK
        run: |
          apt-get update
          apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config
          pip install --upgrade pip
          pip install buildozer cython
          export FORCE_ROOT=1
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          buildozer android debug deploy
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mac-changer-apk
          path: bin/*.apk
