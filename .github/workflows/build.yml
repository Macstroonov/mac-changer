name: Build APK
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install buildozer
        run: |
          pip install buildozer
          sudo apt-get install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config
      
      - name: Build APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
        run: |
          if [ ! -f buildozer.spec ]; then
            echo '[app]' > buildozer.spec
            echo 'title = MAC Changer' >> buildozer.spec
            echo 'package.name = macchanger' >> buildozer.spec
            echo 'package.domain = org.macchanger' >> buildozer.spec
            echo 'source.dir = .' >> buildozer.spec
            echo 'requirements = python3,kivy' >> buildozer.spec
            echo 'android.permissions = INTERNET, ACCESS_WIFI_STATE, CHANGE_WIFI_STATE' >> buildozer.spec
            echo 'android.api = 30' >> buildozer.spec
            echo 'android.minapi = 21' >> buildozer.spec
            echo 'android.ndk = 27c' >> buildozer.spec
            echo '' >> buildozer.spec
            echo '[buildozer]' >> buildozer.spec
            echo 'log_level = 2' >> buildozer.spec
          fi
          yes | buildozer android debug deploy
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mac-changer-apk
          path: bin/*.apk
