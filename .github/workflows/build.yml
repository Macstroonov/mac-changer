name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config
      
      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer
      
      - name: Configure buildozer
        run: |
          SDK_DIR=/home/runner/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR/cmdline-tools
          mkdir -p $SDK_DIR/tools/bin
          
          if [ ! -f $SDK_DIR/cmdline-tools/bin/sdkmanager ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q commandlinetools-linux-11076708_latest.zip -d /tmp/sdk-temp
            cp -r /tmp/sdk-temp/cmdline-tools/* $SDK_DIR/cmdline-tools/
            ln -sf $SDK_DIR/cmdline-tools/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager
          fi
          
          echo y | $SDK_DIR/cmdline-tools/bin/sdkmanager --licenses || true
          echo y | $SDK_DIR/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;37.0.0" || true
      
      - name: Build APK
        run: buildozer android debug deploy
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mac-changer-apk
          path: bin/*.apk
