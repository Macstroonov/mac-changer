name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build APK
        run: |
          chmod -R 777 .
          python -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install buildozer cython
          export FORCE_ROOT=1
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          buildozer android debug deploy
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mac-changer-apk
          path: bin/*.apk
