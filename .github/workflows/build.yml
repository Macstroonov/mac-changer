name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config wget
      
      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer
      
      - name: Setup Android SDK manually
        run: |
          export SDK_DIR=/home/runner/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR
          cd $SDK_DIR
          
          # Скачиваем command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          
          # Создаём правильную структуру
          mkdir -p cmdline-tools
          mv cmdline-tools latest
          mkdir -p cmdline-tools
          mv latest cmdline-tools/
          
          # Принимаем лицензии
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          
          # Устанавливаем компоненты (включая NDK 28c)
          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;37.0.0" "ndk;28.0.13004108"
          
          # Создаём символическую ссылку для Buildozer
          mkdir -p $SDK_DIR/tools/bin
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager
          
          # Создаём ссылку на NDK 28c
          ln -sf $SDK_DIR/ndk/28.0.13004108 /home/runner/.buildozer/android/platform/android-ndk-r28c
          
          # Проверяем установку
          ls -la $SDK_DIR/build-tools/
          ls -la $SDK_DIR/ndk/
      
      - name: Build APK
        run: buildozer android debug deploy
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_NDK_HOME: /home/runner/.buildozer/android/platform/android-ndk-r28c
          ANDROID_NDK_ROOT: /home/runner/.buildozer/android/platform/android-ndk-r28c
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mac-changer-apk
          path: bin/*.apk
